name: supply-chain

# End-to-end container supply chain, in one pipeline:
#   build  ->  SBOM + signed provenance attestations  ->  Docker Scout scan  ->  push (pinned by digest)
#
# Trigger it from the Actions tab ("Run workflow"), or it runs on every push to main.
#
# Before it can run, set these in your forked repo
# (Settings -> Secrets and variables -> Actions):
#   Variable  DOCKERHUB_USERNAME = your Docker Hub username
#   Secret    DOCKERHUB_TOKEN    = a Docker Hub access token (Read & Write)
# The token is a SECRET and is never written into this workflow or the image.

on:
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  contents: read

env:
  IMAGE: docker.io/${{ vars.DOCKERHUB_USERNAME }}/supply-demo:latest

jobs:
  supply-chain:
    runs-on: ubuntu-latest
    steps:
      - name: Check out the source
        uses: actions/checkout@v4

      - name: Set up Buildx          # needed to attach SBOM + provenance attestations
        uses: docker/setup-buildx-action@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build, attest, and push
        id: build
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true                 # attestations require pushing to a registry
          tags: ${{ env.IMAGE }}
          sbom: true                 # attach an SBOM attestation (the ingredients list)
          provenance: mode=max       # attach signed provenance (how and where it was built)

      - name: Scan with Docker Scout
        uses: docker/scout-action@v1
        with:
          command: cves
          image: ${{ env.IMAGE }}
          only-severities: critical,high
          write-comment: false
          # Turn this scan into a policy GATE by adding:  exit-code: true
          # The run then fails when matching vulnerabilities are present.

      - name: Show the digest to pin
        run: |
          echo "Pushed image digest: ${{ steps.build.outputs.digest }}"
          echo "Pin deployments to:  ${{ env.IMAGE }}@${{ steps.build.outputs.digest }}"
